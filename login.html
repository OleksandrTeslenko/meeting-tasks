<!DOCTYPE HTML>
<html manifest="" lang="en">

<head>
    <title>Tocan Task Management</title>

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Clear-Site-Data" content="cache, cookies, storage, executionContexts" />
    <meta http-equiv="Expires" content="-1" />

    <link href="./favicon.ico" rel="icon" type="image/x-icon" />
    <link href="./js/bootstrap-5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/sweetalert.css" type="text/css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/login.css" type="text/css">

    <script type="text/javascript" src="./js/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="./js/bootstrap-5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="./js/sweetalert.min.js"></script>
    <script type="text/javascript" src="./js/config.js"></script>
    <script type="text/javascript" src="./js/login.js"></script>
</head>

<body class="auth-page">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="title">
                <div class="logo">
                    <img class="logo_img">
                    <span class="client-name"></span>
                </div>
                <p class="first-title">TMS</p>
                <p class="sub-title">Task Management System</p>
            </div>

            <form action="#" method="post" onsubmit="localeOnSubmit()">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control custom-input" id="inp_login" placeholder="Login"
                        name="login">
                    <label for="inp_login">Логін</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control custom-input" id="inp_pass" placeholder="Password"
                        name="password">
                    <label for="inp_pass">Пароль</label>

                    <span class="toggle-pass" onclick="togglePass()">👁</span>
                </div>

                <button type="submit" class="btn btn-auth">Увійти</button>
            </form>
        </div>
    </div>

    <div class="footer">
        <span class="client-name"></span> &copy; Task Management System 2025-<span class="current-year">2025</span>
    </div>
</body>

</html>
